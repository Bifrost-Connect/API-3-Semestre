<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect</title>
    <link rel="stylesheet" href="css/cadveiculos.css">
</head>

<body class="pagina-chamados">

<div class="top-bar">
    <div class="left">
        <button id="btnmenu">
            <img src="img/menu.png" alt="icone menu">
        </button>
        <span class="titulo">Bem vindo, <span id="nome-usuario-logado">fulano</span>!</span>
    </div>

    <div class="logout">
        <button id="btnlogout" onclick="btnlogout()">
            <img src="img/logout.png" alt="icone logout">
        </button>
    </div>
</div>

<div class="notificacao-bar">
    <img src="img/bell.png" class="bell">
    <span>Você possui 1 solicitação de serviço!</span>
    <div class="badge">3</div>
</div>

<div id="overlayBlurSidebar" class="overlay-blur-sidebar"></div>

<div id="sidebar" class="sidebar">
    <button id="btnx" class="close-btn">×</button>
    <a href="telainicial.html">TELA INICIAL</a>
    <a href="chamados.html">CHAMADOS</a>
    <a href="cadastrousuarios.html">CADASTRO DE USUÁRIOS</a>
</div>

<div class="chamado-card">
    <h2 class="chamado-titulo">CADASTRO DE VEÍCULOS:</h2>

    <div class="chamado-conteudo">
        <div class="coluna">
            <div class="group">
                <input required="" type="text" class="input" id="modeloVeiculo">
                <span class="highlight"></span>
                <span class="bar"></span>
                <label>Modelo:</label>
            </div>

            <div class="group">
                <input required="" type="text" class="input" id="placaVeiculo">
                <span class="highlight"></span>
                <span class="bar"></span>
                <label>Placa:</label>
            </div>
        </div>

        <div class="coluna">
            <div class="group">
                <input required="" type="text" class="input" id="prefixoVeiculo">
                <span class="highlight"></span>
                <span class="bar"></span>
                <label>Prefixo (ex: CAR006):</label>
            </div>

            <div class="group">
                <input required="" type="text" class="input" id="combustivelVeiculo">
                <span class="highlight"></span>
                <span class="bar"></span>
                <label>Combustível:</label>
            </div>
        </div>
    </div>

    <button class="btn-aceitar" onclick="cadastrarVeiculo()">
        Cadastrar
    </button>
</div>

<div id="modalConfirmacao" class="sobreposicao">
    <div class="popup-card">
        <h2 class="popup-titulo">Concluido!</h2>
        <div class="popup-conteudo">
            <p><strong>Veículo cadastrado com sucesso!</strong></p>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
</body>

</html>
