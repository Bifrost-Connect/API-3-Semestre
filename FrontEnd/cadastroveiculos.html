<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect</title>
    <link rel="stylesheet" href="css/cadveiculos.css">
</head>

<body class="pagina-chamados">

    <!-- BARRA SUPERIOR QUE TEM O LOGOUT E O MENU HAMBURGUER -->

    <div class="top-bar">
        <div class="left">
            <button id="btnmenu">
                <img src="img/menu.png" alt="icone menu">
            </button>
        </div>

        <div class="logout">
            <button id="btnlogout" onclick="btnlogout()">
                <img src="img/logout.png" alt="icone logout">
            </button>
        </div>
    </div>

    <!-- MUDAR AQUI PARA ALGO QUE PUXE A QUANTIDADE DE CHAMADOS -->
    <!-- 
    <div class="notificacao-bar">
        <img src="img/bell.png" class="bell" alt="Notificações">
        <span>Você possui 1 solicitação de serviço!</span>
        <div class="badge">3</div>
    </div>
    -->

    <!-- BLUR DA SIDEBAR -->

    <div id="overlayBlurSidebar" class="overlay-blur-sidebar"></div>

    <div id="sidebar" class="sidebar">
        <button id="btnx" class="close-btn">×</button>
        <a href="telainicial-gestor.html">TELA INICIAL</a>
        <a href="historicochamados.html">HISTÓRICO DE CHAMADOS</a>
        <a href="cadastrousuarios.html">CADASTRO DE USUÁRIOS</a>
        <a href="duvidas.html">DÚVIDAS</a>
        <a href="configuracoes-gestor.html">CONFIGURAÇÕES</a>
    </div>

    <div class="chamado-card">
        <h2 class="chamado-titulo">CADASTRO DE VEÍCULOS:</h2>

        <div class="chamado-conteudo">
            <div class="coluna">
                <div class="group">
                    <input id="veiculo-marca" required type="text" class="input" placeholder=" ">
                    <span class="bar"></span>
                    <label for="veiculo-marca">Marca:</label>
                </div>
                <div class="group">
                    <input id="veiculo-modelo" required type="text" class="input" placeholder=" ">
                    <span class="bar"></span>
                    <label for="veiculo-modelo">Modelo:</label>
                </div>
                <div class="group">
                    <input id="veiculo-tipo" required type="text" class="input" placeholder=" ">
                    <span class="bar"></span>
                    <label for="veiculo-tipo">Tipo de Veículo:</label>
                </div>
            </div>

            <div class="coluna">
                <div class="group">
                    <input id="veiculo-placa" required type="text" class="input" placeholder=" ">
                    <span class="bar"></span>
                    <label for="veiculo-placa">Placa:</label>
                </div>
                <div class="group">
                    <input id="veiculo-prefixo" required type="text" class="input" placeholder=" ">
                    <span class="bar"></span>
                    <label for="veiculo-prefixo">Prefixo:</label>
                </div>
            </div>
        </div>

        <button class="btn-aceitar" onclick="abrirModalConfirmacao()">
            Cadastrar
        </button>
    </div>

    <div id="modalConfirmacao" class="sobreposicao">
        <div class="popup-card">
            <h2 class="popup-titulo">Concluido!</h2>

            <div class="popup-conteudo">
                <p><strong>Veículo cadastrado com sucesso!</strong></p>
            </div>
        </div>
    </div>


    <script src="js/script.js"></script>
</body>

</html>
