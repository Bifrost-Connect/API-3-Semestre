<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect</title>
    <link rel="stylesheet" href="css/cadusuarios.css">
</head>

<body class="pagina-chamados">

    <!-- BARRA SUPERIOR QUE TEM O LOGOUT E O MENU HAMBURGUER -->

    <div class="top-bar">
        <div class="left">
            <button id="btnmenu">
                <img src="img/menu.png" alt="icone menu">
            </button>
        </div>

        <div class="logout">
            <button id="btnlogout" onclick="btnlogout()">
                <img src="img/logout.png" alt="icone logout">
            </button>
        </div>
    </div>

  <!-- MUDAR AQUI PARA ALGO QUE PUXE A QUANTIDADE DE CHAMADOS -->
    <!-- 
    <div class="notificacao-bar">
        <img src="img/bell.png" class="bell" alt="Notificações">
        <span>Você possui 1 solicitação de serviço!</span>
        <div class="badge">3</div>
    </div>
    -->

    <!-- BLUR DA SIDEBAR -->

    <div id="overlayBlurSidebar" class="overlay-blur-sidebar"></div>

    <div id="sidebar" class="sidebar">
        <button id="btnx" class="close-btn">×</button>
        <a href="telainicial-gestor.html">TELA INICIAL</a>
        <a href="historicochamados.html">HISTÓRICO DE CHAMADOS</a>
        <a href="cadastroveiculos.html">CADASTRO DE VEÍCULOS</a>
        <a href="duvidas.html">DÚVIDAS</a>
        <a href="configuracoes-gestor.html">CONFIGURAÇÕES</a>
    </div>

    <div class="chamado-card">
        <h2 class="chamado-titulo">CADASTRO DE USUÁRIOS:</h2>

        <!-- PRECISA FAZER O BACKEND PARA PREENCHER OS DADOS -->

        <div class="chamado-conteudo">

            <div class="coluna">

                <div class="group">
                    <input id="usuario-nome" required type="text" class="input" placeholder=" ">
                    <span class="highlight"></span>
                    <span class="bar"></span>
                    <label for="usuario-nome">Nome:</label>
                </div>


                <div class="group">
                    <input id="usuario-email" required type="email" class="input" placeholder=" ">
                    <span class="highlight"></span>
                    <span class="bar"></span>
                    <label for="usuario-email">E-mail:</label>
                </div>

            </div>

            <div class="coluna">

                <div class="group">
                    <input id="usuario-matricula" required type="text" class="input" placeholder=" ">
                    <span class="highlight"></span>
                    <span class="bar"></span>
                    <label for="usuario-matricula">Matrícula:</label>
                </div>


                <div class="group">
                    <input id="usuario-senha" required type="password" class="input" placeholder=" ">
                    <span class="highlight"></span>
                    <span class="bar"></span>
                    <label for="usuario-senha">Senha:</label>
                </div>

            </div>



        </div>

        <button class="btn-aceitar" onclick="abrirModalConfirmacao()">
            Cadastrar
        </button>
    </div>

    <div id="modalConfirmacao" class="sobreposicao">
        <div class="popup-card">
            <h2 class="popup-titulo">Concluido!</h2>

            <div class="popup-conteudo">
                <p><strong>Usuário cadastrado com sucesso!</strong></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
