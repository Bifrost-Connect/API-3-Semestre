<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect</title>
    <link rel="stylesheet" href="css/telainicial.css">
</head>

<body class="pagina-telainicial">

    <!-- ADICIONAR O BACKEND PARA RECEBER OS DADOS DO USUÁRIO -->
    <div class="top-bar">
        <div class="left">
            <button id="btnmenu">
                <img src="img/menu.png" alt="icone menu">
            </button>
            <span class="titulo">Bem vindo, fulano!</span>
        </div>

        <div class="logout">
            <button id="btnlogout" onclick="btnlogout()">
                <img src="img/logout.png" alt="icone logout">
            </button>
        </div>
    </div>

    <div class="notificacao-bar" onclick="window.location.href='chamados.html';">
        <img src="img/bell.png" class="bell">
        <span>Você possui 1 solicitação de serviço!</span>
        <div class="badge">3</div>
    </div>

    <!-- PRECISA ARRUMAR O BACKEND PARA PUXAR OS DADOS E MUDAR O TEXTO (NÃO SEI COMO VÃO FAZER ISSO, SE PRECISAR DE AJUDA DA UM SALVE) -->

    <div class="quadros-container">
        <div class="quadro-esquerdo">
            <h3>Informações do Veículo</h3>
            <div id="info-veiculo">
                <p>Nenhum veículo selecionado.</p>
            </div>
            <div class="campos-adicionais">
                <label for="quilometragem-atual">Quilometragem Atual:</label>
                <input type="text" id="quilometragem-atual" placeholder="Digite a quilometragem">
                <label for="observacoes">Observações:</label>
                <textarea id="observacoes" placeholder="Digite observações"></textarea>
                <button id="btn-salvar-veiculo">Salvar</button>
            </div>
        </div>
        <div class="quadro-direito">
            <h3>Chamado Atual</h3>
            <div id="info-chamado">
                <p>Nenhum chamado ativo.</p>
            </div>
            <button id="btn-checkout">Checkout</button>
        </div>
    </div>

    <!-- BLUR DA SIDEBAR -->

    <div id="overlayBlurSidebar" class="overlay-blur-sidebar"></div>

    <div id="sidebar" class="sidebar">
        <button id="btnx" class="close-btn">×</button>
        <a href="chamados.html">CHAMADOS</a>
        <a href="cadastrousuarios.html">CADASTRO DE USUÁRIOS</a>
        <a href="cadastroveiculos.html">CADASTRO DE VEÍCULOS</a>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
